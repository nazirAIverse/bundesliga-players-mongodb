services:
  mongo1:
    image: mongo:latest
    container_name: my-mongo-1
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 123
    volumes:
      - mongo_data:/data/db

  api:
    image: mongo:latest
    container_name: my-mongo-2
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 123
    volumes:
      - mongo_data2:/data/db

volumes:
  mongo_data:
  mongo_data2: